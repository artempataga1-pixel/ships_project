<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Крестики-нолики | Iron Man</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="bg-overlay"></div>

  <div class="container">

    <header>
      <h1 class="logo-title">
        <span class="iron">IRON</span>
        <span class="man">MAN</span>
      </h1>
      <p class="subtitle">Крестики-нолики</p>
    </header>

    <div class="turn-indicators">
      <div class="player-btn active" id="btn-player1">
        <span class="player-icon">✕</span>
        <span class="player-label">Игрок 1</span>
        <span class="player-marker">(X)</span>
      </div>

      <div class="vs-divider">VS</div>

      <div class="player-btn" id="btn-player2">
        <span class="player-icon">○</span>
        <span class="player-label">Игрок 2</span>
        <span class="player-marker">(O)</span>
      </div>
    </div>

    <div class="board-wrapper">
      <div class="board" id="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
      </div>
    </div>

    <div class="result-overlay" id="result-overlay" aria-hidden="true">
      <div class="result-box">
        <div class="result-icon" id="result-icon"></div>
        <h2 class="result-title" id="result-title"></h2>
        <p class="result-sub" id="result-sub"></p>
        <button class="new-game-btn" id="new-game-btn">Новая игра</button>
      </div>
    </div>

  </div>

  <script src="game.js"></script>
</body>
</html>
