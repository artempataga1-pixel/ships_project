<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 210" fill="white">
  <!-- Геометрический символ ШП (Шумская и Партнёры) -->
  <!-- Три вертикальных столбца (левая группа «Ш») -->
  <rect x="0"  y="37" width="24" height="163"/>
  <rect x="52" y="37" width="24" height="163"/>
  <rect x="92" y="37" width="24" height="163"/>
  <!-- Нижняя горизонтальная перемычка трёх столбцов -->
  <rect x="0" y="182" width="116" height="18"/>
  <!-- Угловой элемент справа (скоба ┐): верхняя горизонталь + правая вертикаль -->
  <rect x="134" y="0"  width="66" height="20"/>
  <rect x="176" y="0"  width="24" height="166"/>
</svg>
